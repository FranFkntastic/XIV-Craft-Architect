name: Deploy Lodestone Helper to VPS

on:
  push:
    branches: [ main, local-dev ]
    paths:
      - 'src/FFXIV Craft Architect.LodestoneLookup/**'
      - 'src/FFXIV Craft Architect.Core/**'
      - 'src/FFXIV Craft Architect.Web/Services/HttpLodestoneCrafterLookupService.cs'
      - 'src/FFXIV Craft Architect.Web/Program.cs'
      - 'src/FFXIV Craft Architect.Web/wwwroot/appsettings.json'
      - 'src/FFXIV Craft Architect.ContractTests/**'
      - 'global.json'
      - '.github/workflows/deploy-vps-lodestone.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vps-lodestone-helper
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore locked contract graph
        run: >
          dotnet restore "src/FFXIV Craft Architect.ContractTests/FFXIV Craft Architect.ContractTests.csproj"
          --locked-mode

      - name: Run Lodestone contract tests
        run: >
          dotnet test "src/FFXIV Craft Architect.ContractTests/FFXIV Craft Architect.ContractTests.csproj"
          --configuration Release
          --no-restore
          --blame-hang
          --blame-hang-timeout 2m
          --blame-hang-dump-type mini
          --logger "console;verbosity=normal"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_HOST_KEY: ${{ secrets.VPS_SSH_HOST_KEY }}
      VPS_SSH_PORT: 22
    steps:
      - name: Checkout source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Publish Lodestone helper
        run: >
          dotnet publish "src/FFXIV Craft Architect.LodestoneLookup/FFXIV Craft Architect.LodestoneLookup.csproj"
          -c Release
          -r linux-x64
          --self-contained true
          -o dist/lodestone

      - name: Package helper files
        id: package
        shell: bash
        run: |
          release="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"
          archive="craftarchitect-lodestone-$release.tar.gz"
          tar -czf "$archive" -C dist/lodestone .
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Write remote deploy script
        shell: bash
        run: |
          cat > deploy-lodestone-remote.sh <<'REMOTE'
          set -euo pipefail

          release="$1"
          archive="/tmp/craftarchitect-lodestone-$release.tar.gz"
          root="/srv/craftarchitect/services/lodestone"
          release_dir="$root/releases/$release"
          executable="$release_dir/FFXIV Craft Architect.LodestoneLookup"

          sudo mkdir -p "$release_dir"
          sudo mkdir -p "$root/data" "$root/env"
          sudo tar -xzf "$archive" -C "$release_dir"
          sudo chown -R "$USER:$USER" "$release_dir"
          sudo chown -R "$USER:$USER" "$root/data" "$root/env"
          sudo chmod +x "$executable"

          if [[ ! -f "$root/env/profile-host.env" ]]; then
            tee "$root/env/profile-host.env" > /dev/null <<ENV
          ProfileHost__Enabled=false
          ProfileHost__DatabasePath=$root/data/profile-host.db
          ENV
          fi

          sudo tee "$root/run-lodestone.sh" > /dev/null <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -f /srv/craftarchitect/services/lodestone/env/profile-host.env ]]; then
            set -a
            source /srv/craftarchitect/services/lodestone/env/profile-host.env
            set +a
          fi
          cd /srv/craftarchitect/services/lodestone/current
          exec "/srv/craftarchitect/services/lodestone/current/FFXIV Craft Architect.LodestoneLookup"
          SCRIPT
          sudo chmod +x "$root/run-lodestone.sh"

          sudo ln -sfn "$release_dir" "$root/current"
          sudo systemctl restart craftarchitect-lodestone
          systemctl is-active craftarchitect-lodestone
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:5128/ > /dev/null; then
              break
            fi

            if [[ "$attempt" == "30" ]]; then
              journalctl -u craftarchitect-lodestone --no-pager -n 80
              exit 1
            fi

            sleep 1
          done

          rm -f "$archive" /tmp/deploy-lodestone-remote.sh

          sudo find "$root/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' |
            sort -rn |
            tail -n +6 |
            cut -d' ' -f2- |
            sudo xargs -r rm -rf
          REMOTE

      - name: Configure SSH
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_SSH_HOST_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/craftarchitect_vps
          chmod 600 ~/.ssh/craftarchitect_vps
          # Pin the VPS host key from secrets instead of trusting a live scan.
          printf '%s\n' "$VPS_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload helper archive and deploy script
        run: >
          scp -P "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "${{ steps.package.outputs.archive }}"
          deploy-lodestone-remote.sh
          "$VPS_USER@$VPS_HOST:/tmp/"

      - name: Activate helper release
        run: >
          ssh -p "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "$VPS_USER@$VPS_HOST"
          "bash /tmp/deploy-lodestone-remote.sh '${{ steps.package.outputs.release }}'"

      - name: Verify public helper routes on both domains
        run: |
          set -euo pipefail
          for domain in xivcraftarchitect.com dev.xivcraftarchitect.com; do
            # Known-good Lodestone probe: Level Checker on Behemoth is character 16331040.
            curl --fail --silent --show-error \
              "https://$domain/api/lodestone/crafters/search?name=Level%20Checker&world=Behemoth" \
              | grep -q 16331040
            curl --fail --silent --show-error \
              "https://$domain/api/xivdata/items/search?q=Varn&limit=12" \
              | grep -qi varn
          done
