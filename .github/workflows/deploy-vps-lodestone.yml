name: Deploy Lodestone Helper to VPS

on:
  push:
    branches: [ main, master, local-dev ]
    paths:
      - 'src/FFXIV Craft Architect.LodestoneLookup/**'
      - 'src/FFXIV Craft Architect.Core/**'
      - 'src/FFXIV Craft Architect.Web/Services/HttpLodestoneCrafterLookupService.cs'
      - 'src/FFXIV Craft Architect.Web/Program.cs'
      - 'src/FFXIV Craft Architect.Web/wwwroot/appsettings.json'
      - 'src/FFXIV Craft Architect.Tests/**'
      - 'scripts/Assert-DeployTestSurface.ps1'
      - '.github/workflows/deploy-vps-lodestone.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vps-lodestone-helper
  cancel-in-progress: false

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Validate Lodestone deploy test slice
        shell: pwsh
        run: >
          ./scripts/Assert-DeployTestSurface.ps1
          -Surface DeployLodestone

      - name: Run Lodestone deploy test slice
        run: >
          dotnet test "src/FFXIV Craft Architect.Tests/FFXIV Craft Architect.Tests.csproj"
          --configuration Release
          --no-restore
          --no-build
          --filter "Surface=DeployLodestone"
          --blame-hang
          --blame-hang-timeout 2m
          --blame-hang-dump-type mini
          --logger "console;verbosity=normal"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_PORT: 22
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Lodestone helper
        run: >
          dotnet publish "src/FFXIV Craft Architect.LodestoneLookup/FFXIV Craft Architect.LodestoneLookup.csproj"
          -c Release
          -r linux-x64
          --self-contained true
          -o dist/lodestone

      - name: Package helper files
        id: package
        shell: bash
        run: |
          release="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"
          archive="craftarchitect-lodestone-$release.tar.gz"
          tar -czf "$archive" -C dist/lodestone .
          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Write remote deploy script
        shell: bash
        run: |
          cat > deploy-lodestone-remote.sh <<'REMOTE'
          set -euo pipefail

          release="$1"
          archive="/tmp/craftarchitect-lodestone-$release.tar.gz"
          root="/srv/craftarchitect/services/lodestone"
          release_dir="$root/releases/$release"
          executable="$release_dir/FFXIV Craft Architect.LodestoneLookup"

          sudo mkdir -p "$release_dir"
          sudo tar -xzf "$archive" -C "$release_dir"
          sudo chown -R "$USER:$USER" "$release_dir"
          sudo chmod +x "$executable"

          sudo tee "$root/run-lodestone.sh" > /dev/null <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          cd /srv/craftarchitect/services/lodestone/current
          exec "/srv/craftarchitect/services/lodestone/current/FFXIV Craft Architect.LodestoneLookup"
          SCRIPT
          sudo chmod +x "$root/run-lodestone.sh"

          sudo ln -sfn "$release_dir" "$root/current"
          sudo systemctl restart craftarchitect-lodestone
          systemctl is-active craftarchitect-lodestone
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:5128/ > /dev/null; then
              break
            fi

            if [[ "$attempt" == "30" ]]; then
              journalctl -u craftarchitect-lodestone --no-pager -n 80
              exit 1
            fi

            sleep 1
          done

          rm -f "$archive" /tmp/deploy-lodestone-remote.sh

          sudo find "$root/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' |
            sort -rn |
            tail -n +6 |
            cut -d' ' -f2- |
            sudo xargs -r rm -rf
          REMOTE

      - name: Configure SSH
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/craftarchitect_vps
          chmod 600 ~/.ssh/craftarchitect_vps
          ssh-keyscan -p "$VPS_SSH_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload helper archive and deploy script
        run: >
          scp -P "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "${{ steps.package.outputs.archive }}"
          deploy-lodestone-remote.sh
          "$VPS_USER@$VPS_HOST:/tmp/"

      - name: Activate helper release
        run: >
          ssh -p "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "$VPS_USER@$VPS_HOST"
          "bash /tmp/deploy-lodestone-remote.sh '${{ steps.package.outputs.release }}'"

      - name: Verify public helper route
        run: >
          curl --fail --silent --show-error
          "https://dev.xivcraftarchitect.com/api/lodestone/crafters/search?name=Level%20Checker&world=Behemoth"
          > /dev/null
