name: Deploy Web App to VPS

on:
  push:
    branches: [ main, master, local-dev ]
    paths:
      - 'src/FFXIV Craft Architect.Web/**'
      - 'src/FFXIV Craft Architect.Core/**'
      - 'src/FFXIV Craft Architect.Tests/**'
      - 'scripts/Assert-DeployTestSurface.ps1'
      - 'global.json'
      - '.github/workflows/deploy-vps-web.yml'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Web slot to deploy'
        required: true
        default: local-dev
        type: choice
        options:
          - main
          - local-dev

permissions:
  contents: read

concurrency:
  group: vps-web-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.slot || github.ref_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Validate web deploy test slice
        shell: pwsh
        run: >
          ./scripts/Assert-DeployTestSurface.ps1
          -Surface DeployWeb

      - name: Run web deploy test slice
        run: >
          dotnet test "src/FFXIV Craft Architect.Tests/FFXIV Craft Architect.Tests.csproj"
          --configuration Release
          --no-restore
          --no-build
          --filter "Surface=DeployWeb"
          --blame-hang
          --blame-hang-timeout 2m
          --blame-hang-dump-type mini
          --logger "console;verbosity=normal"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_SSH_HOST_KEY: ${{ secrets.VPS_SSH_HOST_KEY }}
      VPS_SSH_PORT: 22
    steps:
      - name: Resolve deploy slot
        id: deploy-slot
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            slot="${{ inputs.slot }}"
          elif [[ "${{ github.ref_name }}" == "local-dev" ]]; then
            slot="local-dev"
          else
            slot="main"
          fi

          if [[ "$slot" == "local-dev" ]]; then
            domain="dev.xivcraftarchitect.com"
            ref="local-dev"
            generation_enabled="true"
            engine_enabled="true"
          elif [[ "$slot" == "main" ]]; then
            domain="xivcraftarchitect.com"
            ref="main"
            generation_enabled="false"
            engine_enabled="false"
          else
            echo "Unsupported deploy slot: $slot" >&2
            exit 1
          fi

          release="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"
          {
            echo "slot=$slot"
            echo "domain=$domain"
            echo "ref=$ref"
            echo "release=$release"
            echo "generation_enabled=$generation_enabled"
            echo "engine_enabled=$engine_enabled"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy-slot.outputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish web app
        run: >
          dotnet publish "src/FFXIV Craft Architect.Web/FFXIV Craft Architect.Web.csproj"
          -c Release
          -o dist/web
          -p:BuildInfoBranchName=${{ steps.deploy-slot.outputs.ref }}

      - name: Write hosted API configuration
        shell: bash
        run: |
          cat > dist/web/wwwroot/appsettings.json <<JSON
          {
            "LodestoneLookup": {
              "BaseAddress": "https://${{ steps.deploy-slot.outputs.domain }}/api/"
            },
            "ProcurementRoutes": {
              "GenerationEnabled": ${{ steps.deploy-slot.outputs.generation_enabled }}
            },
            "EngineRewrite": {
              "ExecutionEnabled": ${{ steps.deploy-slot.outputs.engine_enabled }}
            },
            "EngineAcceptance": {
              "Enabled": false,
              "UseDeterministicEvidence": false
            }
          }
          JSON

      - name: Package web files
        run: tar -czf "craftarchitect-web-${{ steps.deploy-slot.outputs.slot }}-${{ steps.deploy-slot.outputs.release }}.tar.gz" -C dist/web/wwwroot .

      - name: Configure SSH
        shell: bash
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_SSH_HOST_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/craftarchitect_vps
          chmod 600 ~/.ssh/craftarchitect_vps
          # Pin the VPS host key from secrets instead of trusting a live scan.
          printf '%s\n' "$VPS_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload web archive
        run: >
          scp -P "$VPS_SSH_PORT"
          -i ~/.ssh/craftarchitect_vps
          "craftarchitect-web-${{ steps.deploy-slot.outputs.slot }}-${{ steps.deploy-slot.outputs.release }}.tar.gz"
          "$VPS_USER@$VPS_HOST:/tmp/craftarchitect-web-${{ steps.deploy-slot.outputs.slot }}-${{ steps.deploy-slot.outputs.release }}.tar.gz"

      - name: Activate web release
        shell: bash
        run: |
          ssh -p "$VPS_SSH_PORT" -i ~/.ssh/craftarchitect_vps "$VPS_USER@$VPS_HOST" <<'REMOTE'
          set -euo pipefail
          slot="${{ steps.deploy-slot.outputs.slot }}"
          release="${{ steps.deploy-slot.outputs.release }}"
          archive="/tmp/craftarchitect-web-$slot-$release.tar.gz"
          root="/srv/craftarchitect/web/$slot"
          release_dir="$root/releases/$release"

          sudo mkdir -p "$release_dir"
          sudo tar -xzf "$archive" -C "$release_dir"
          sudo chown -R "$USER:$USER" "$release_dir"
          sudo ln -sfn "$release_dir" "$root/current"
          rm -f "$archive"

          # Keep the last five releases for quick symlink rollback.
          sudo find "$root/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' |
            sort -rn |
            tail -n +6 |
            cut -d' ' -f2- |
            sudo xargs -r rm -rf
          REMOTE

      - name: Verify deployed site
        run: |
          curl --fail --silent --show-error "https://${{ steps.deploy-slot.outputs.domain }}/appsettings.json" \
            | grep -q "https://${{ steps.deploy-slot.outputs.domain }}/api/"
          curl --fail --silent --show-error "https://${{ steps.deploy-slot.outputs.domain }}/appsettings.json" \
            | grep -q '"GenerationEnabled": ${{ steps.deploy-slot.outputs.generation_enabled }}'
          curl --fail --silent --show-error "https://${{ steps.deploy-slot.outputs.domain }}/appsettings.json" \
            | grep -q '"ExecutionEnabled": ${{ steps.deploy-slot.outputs.engine_enabled }}'
          curl --fail --silent --show-error "https://${{ steps.deploy-slot.outputs.domain }}/" > /dev/null
