name: Manual GitHub Pages Moved Notice Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-moved-notice
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Assemble moved notice
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/pages/local-dev

          cat > dist/pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>FFXIV Craft Architect has moved</title>
            <style>
              :root {
                color-scheme: dark;
                --bg: #111318;
                --panel: #1b2029;
                --text: #eef2f7;
                --muted: #a9b4c3;
                --accent: #8fd3ff;
                --line: #313946;
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background: var(--bg);
                color: var(--text);
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }

              main {
                width: min(100%, 620px);
                padding: 28px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
              }

              h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 7vw, 3.25rem);
                line-height: 1;
              }

              p {
                margin: 0 0 18px;
                color: var(--muted);
                font-size: 1.05rem;
                line-height: 1.5;
              }

              a {
                display: inline-flex;
                align-items: center;
                min-height: 44px;
                padding: 0 16px;
                border: 1px solid var(--accent);
                border-radius: 6px;
                color: var(--text);
                text-decoration: none;
                font-weight: 650;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>FFXIV Craft Architect has moved</h1>
              <p>The GitHub Pages version is retired. The current public build now lives at its new home.</p>
              <a href="https://xivcraftarchitect.com/">Open xivcraftarchitect.com</a>
            </main>
          </body>
          </html>
          HTML

          cat > dist/pages/local-dev/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>FFXIV Craft Architect dev route moved</title>
            <style>
              :root {
                color-scheme: dark;
                --bg: #111318;
                --panel: #1b2029;
                --text: #eef2f7;
                --muted: #a9b4c3;
                --accent: #8fd3ff;
                --line: #313946;
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background: var(--bg);
                color: var(--text);
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }

              main {
                width: min(100%, 620px);
                padding: 28px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
              }

              h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 7vw, 3.25rem);
                line-height: 1;
              }

              p {
                margin: 0 0 18px;
                color: var(--muted);
                font-size: 1.05rem;
                line-height: 1.5;
              }

              a {
                display: inline-flex;
                align-items: center;
                min-height: 44px;
                padding: 0 16px;
                border: 1px solid var(--accent);
                border-radius: 6px;
                color: var(--text);
                text-decoration: none;
                font-weight: 650;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>This route has moved</h1>
              <p>If you're here, you know where to find the dev build.</p>
              <a href="https://xivcraftarchitect.com/">Open the public build</a>
            </main>
          </body>
          </html>
          HTML

          cat > dist/pages/404.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>FFXIV Craft Architect has moved</title>
            <style>
              :root {
                color-scheme: dark;
                --bg: #111318;
                --panel: #1b2029;
                --text: #eef2f7;
                --muted: #a9b4c3;
                --accent: #8fd3ff;
                --line: #313946;
              }

              * {
                box-sizing: border-box;
              }

              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background: var(--bg);
                color: var(--text);
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }

              main {
                width: min(100%, 620px);
                padding: 28px;
                border: 1px solid var(--line);
                border-radius: 8px;
                background: var(--panel);
              }

              h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 7vw, 3.25rem);
                line-height: 1;
              }

              p {
                margin: 0 0 18px;
                color: var(--muted);
                font-size: 1.05rem;
                line-height: 1.5;
              }

              a {
                display: inline-flex;
                align-items: center;
                min-height: 44px;
                padding: 0 16px;
                border: 1px solid var(--accent);
                border-radius: 6px;
                color: var(--text);
                text-decoration: none;
                font-weight: 650;
              }
            </style>
          </head>
          <body>
            <main>
              <h1 id="title">FFXIV Craft Architect has moved</h1>
              <p id="message">The GitHub Pages version is retired. The current public build now lives at its new home.</p>
              <a href="https://xivcraftarchitect.com/">Open xivcraftarchitect.com</a>
            </main>
            <script>
              if (window.location.pathname.includes('/local-dev')) {
                document.getElementById('title').textContent = 'This route has moved';
                document.getElementById('message').textContent = "If you're here, you know where to find the dev build.";
              }
            </script>
          </body>
          </html>
          HTML

          touch dist/pages/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
